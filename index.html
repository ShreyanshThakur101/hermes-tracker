<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES | Ground Station Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
</head>
<body>
    <div class="gs-wrapper">
        <aside class="sidebar">
            <header style="margin-bottom: 30px;">
                <h1 style="font-size: 1rem; color: var(--hermes-cyan); margin: 0; letter-spacing: 3px;">HERMES GS-1</h1>
                <p style="font-size: 0.6rem; color: var(--text-muted); margin: 5px 0;">STRATEGIC_GROUND_CONTROL</p>
            </header>

            <div class="telemetry-stack">
                <div class="metric-tile"><div class="metric-label">Latitude</div><div id="v-lat" class="metric-value">0.000000</div></div>
                <div class="metric-tile"><div class="metric-label">Longitude</div><div id="v-lon" class="metric-value">0.000000</div></div>
                <div class="metric-tile"><div class="metric-label">Altitude</div><div id="v-alt" class="metric-value">0.0 m</div></div>
                <div class="metric-tile"><div class="metric-label">Temp / Press</div><div id="v-env" class="metric-value">-- / --</div></div>
                <div class="metric-tile"><div class="metric-label">Accel Matrix</div><div id="v-acc" class="metric-value" style="font-size: 0.9rem;">0.0, 0.0, 0.0</div></div>
                <div class="metric-tile"><div class="metric-label">Gyro Matrix</div><div id="v-gyro" class="metric-value" style="font-size: 0.9rem;">0.0, 0.0, 0.0</div></div>
                <div class="metric-tile"><div class="metric-label">Sync Pulse</div><div id="v-sync" class="metric-value" style="font-size: 0.8rem;">--:--:--</div></div>
            </div>

            <div id="viewer-animation-block" style="margin-top: 20px;">
                <!-- Protocol Animations -->
                <div id="precrash-viz" class="protocol-stage">
                    <div class="svg-pipeline">
                        <svg viewBox="0 0 24 24" class="svg-icon flashing-sd"><path d="M18 2H10L4 8v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 8H7V4h2v4zm4 0h-2V4h2v4zm4 0h-2V4h2v4z"/></svg>
                        <svg viewBox="0 0 24 24" class="svg-icon flashing-sd"><path d="M18 2H10L4 8v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 8H7V4h2v4zm4 0h-2V4h2v4zm4 0h-2V4h2v4z"/></svg>
                    </div>
                    <div class="anim-banner">UPLOADING DATA TO SD CARDS</div>
                </div>

                <div id="sync-viz" class="protocol-stage">
                    <svg viewBox="0 0 24 24" class="svg-icon" style="width: 50px; height: 50px;"><path d="M20 13H4c-1.1 0-2 .9-2 2v3c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-3c0-1.1-.9-2-2-2zm-1 4h-2v-1h2v1zm-4 0h-2v-1h2v1zm5-13H4c-1.1 0-2 .9-2 2v3c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 4h-2V7h2v1zm-4 0h-2V7h2v1z"/></svg>
                    <div class="anim-banner">UPDATING DATA FROM SD TO DB</div>
                </div>
            </div>

            <div id="status-card" class="status-flag-box">
                <div class="metric-label" style="color: inherit;">System State</div>
                <div id="v-status" style="font-size: 1.2rem; font-weight: bold; margin-top: 5px;">STABLE</div>
            </div>
        </aside>

        <main class="map-viewport">
            <div id="map"></div>
        </main>
    </div>

    <script>
        const DB_URL = "https://hermes-5aea5-default-rtdb.asia-southeast1.firebasedatabase.app/gps.json";
        
        // Leaflet Init
        const map = L.map('map', { zoomControl: false }).setView([20.5937, 78.9629], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
        
        const customMarker = L.divIcon({
            className: 'hermes-marker',
            html: `<div style="width:16px;height:16px;background:#00e5ff;border-radius:50%;border:2px solid white;box-shadow:0 0 15px #00e5ff;"></div>`,
            iconSize: [16, 16], iconAnchor: [8, 8]
        });
        const marker = L.marker([0, 0], { icon: customMarker }).addTo(map);

        let lastStatus = "NORMAL";
        let isProcessingProtocol = false;

        async function updateDashboard() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                document.getElementById('v-lat').textContent = parseFloat(data.lat || 0).toFixed(6);
                document.getElementById('v-lon').textContent = parseFloat(data.lon || 0).toFixed(6);
                document.getElementById('v-alt').textContent = parseFloat(data.alt || 0).toFixed(1) + " m";
                document.getElementById('v-env').textContent = `${data.temp || '--'}C / ${data.press || '--'}hPa`;
                document.getElementById('v-acc').textContent = data.accel || "0, 0, 0";
                document.getElementById('v-gyro').textContent = data.gyro || "0, 0, 0";
                document.getElementById('v-sync').textContent = new Date(data.timestamp || Date.now()).toLocaleTimeString();

                const status = (data.status || "NORMAL").toUpperCase();
                const card = document.getElementById('status-card');
                const text = document.getElementById('v-status');
                const pcViz = document.getElementById('precrash-viz');
                const syncViz = document.getElementById('sync-viz');
                
                text.textContent = status === "NORMAL" ? "STABLE" : status;
                card.className = "status-flag-box"; // reset
                
                // Trigger Protocol on Status Change
                if (status !== lastStatus) {
                    if ((status === "PRECRASH" || status === "CRASH") && !isProcessingProtocol) {
                        isProcessingProtocol = true;
                        pcViz.classList.add('protocol-active');
                        syncViz.classList.add('protocol-active');

                        setTimeout(() => {
                            pcViz.classList.remove('protocol-active');
                            syncViz.classList.remove('protocol-active');
                            alert("Data sent successfully");
                            isProcessingProtocol = false;
                        }, 5000);
                    }
                    lastStatus = status;
                }

                if (status === "PRECRASH") {
                    card.classList.add('alert-amber');
                } else if (status === "CRASH") {
                    card.classList.add('alert-red');
                }

                const pos = [data.lat || 0, data.lon || 0];
                marker.setLatLng(pos);
                map.panTo(pos);
            } catch (e) { console.error(e); }
        }

        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
