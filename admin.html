<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERMES | Transmitter Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-wrapper">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 0.9rem; color: var(--hermes-cyan); margin: 0; letter-spacing: 2px;">HERMES TRANSMITTER</h1>
        </header>

        <main class="telemetry-readouts">
            <div class="metric-tile"><div class="metric-label">Latitude</div><div id="ph-lat" class="metric-value">---</div></div>
            <div class="metric-tile"><div class="metric-label">Longitude</div><div id="ph-lon" class="metric-value">---</div></div>
            <div class="metric-tile"><div class="metric-label">Altitude</div><div id="ph-alt" class="metric-value">---</div></div>
        </main>

        <section class="btn-group">
            <button id="beaconBtn" class="hermes-btn btn-primary">Initiate Beacon</button>
            <button id="preCrashBtn" class="hermes-btn btn-warn">Run Pre-Crash Protocol</button>
            <button id="crashBtn" class="hermes-btn btn-danger">Run Crash Protocol</button>
        </section>

        <!-- Protocol Animations -->
        <div id="precrash-viz" class="protocol-stage">
            <div class="svg-pipeline">
                <svg viewBox="0 0 24 24" class="svg-icon flashing-sd"><path d="M18 2H10L4 8v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 8H7V4h2v4zm4 0h-2V4h2v4zm4 0h-2V4h2v4z"/></svg>
                <svg viewBox="0 0 24 24" class="svg-icon flashing-sd"><path d="M18 2H10L4 8v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 8H7V4h2v4zm4 0h-2V4h2v4zm4 0h-2V4h2v4z"/></svg>
            </div>
            <div class="anim-banner">UPLOADING DATA TO SD CARDS</div>
        </div>

        <div id="sync-viz" class="protocol-stage">
            <svg viewBox="0 0 24 24" class="svg-icon" style="width: 50px; height: 50px;"><path d="M20 13H4c-1.1 0-2 .9-2 2v3c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2v-3c0-1.1-.9-2-2-2zm-1 4h-2v-1h2v1zm-4 0h-2v-1h2v1zm5-13H4c-1.1 0-2 .9-2 2v3c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-1 4h-2V7h2v1zm-4 0h-2V7h2v1z"/></svg>
            <div class="anim-banner">UPDATING DATA FROM SD TO DB</div>
        </div>
    </div>

    <script>
        const DB_URL = "https://hermes-5aea5-default-rtdb.asia-southeast1.firebasedatabase.app/gps.json";
        let state = { lat: 0, lon: 0, alt: 0, status: "NORMAL", active: false };
        let txInterval = null;

        // High-Speed GPS Caching
        navigator.geolocation.watchPosition(
            (pos) => {
                state.lat = pos.coords.latitude;
                state.lon = pos.coords.longitude;
                state.alt = pos.coords.altitude || 0;
                document.getElementById('ph-lat').textContent = state.lat.toFixed(6);
                document.getElementById('ph-lon').textContent = state.lon.toFixed(6);
                document.getElementById('ph-alt').textContent = state.alt.toFixed(1) + " m";
            },
            null, { enableHighAccuracy: true, maximumAge: 0, timeout: 1000 }
        );

        const beaconBtn = document.getElementById('beaconBtn');
        beaconBtn.onclick = () => {
            state.active = !state.active;
            beaconBtn.classList.toggle('active');
            beaconBtn.textContent = state.active ? "Terminate Beacon" : "Initiate Beacon";
            if (state.active) {
                txInterval = setInterval(transmit, 500);
                document.getElementById('sync-viz').classList.add('protocol-active');
            } else {
                clearInterval(txInterval);
                document.getElementById('sync-viz').classList.remove('protocol-active');
            }
        };

        document.getElementById('preCrashBtn').onclick = () => {
            state.status = "PRECRASH";
            document.getElementById('precrash-viz').classList.add('protocol-active');
            transmit();
        };

        document.getElementById('crashBtn').onclick = () => {
            state.status = "CRASH";
            document.body.classList.add('lockdown-red');
            transmit();
            if (!state.active) txInterval = setInterval(transmit, 500);
        };

        async function transmit() {
            const payload = {
                lat: state.lat, lon: state.lon, alt: state.alt,
                status: state.status, timestamp: Date.now(),
                temp: (24 + Math.random() * 2).toFixed(1),
                press: (1013 + Math.random() * 5).toFixed(1),
                accel: `${(Math.random()).toFixed(2)}, ${(Math.random()).toFixed(2)}, 9.81`,
                gyro: `${(Math.random()).toFixed(2)}, ${(Math.random()).toFixed(2)}, ${(Math.random()).toFixed(2)}`
            };
            try {
                await fetch(DB_URL, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error("TX_FAIL", e); }
        }
    </script>
</body>
</html>
