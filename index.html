<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HERMES | Strategic Telemetry System</title>
    
    <!-- External Dependencies -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(10, 10, 10, 0.95);
            --accent-green: #00ff41;
            --accent-orange: #ff9d00;
            --accent-red: #ff0033;
            --text-main: #e0e0e0;
            --border-dim: #222;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg-dark); color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        /* --- MODE ROUTING --- */
        #viewer-root, #tracker-root { display: none; height: 100%; width: 100%; }
        body.mode-viewer #viewer-root { display: flex; }
        body.mode-tracker #tracker-root { display: flex; flex-direction: column; }

        /* --- VIEWER (GROUND CONTROL) STYLES --- */
        .sidebar {
            width: 400px;
            background: var(--panel-bg);
            border-right: 2px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            padding: 30px;
            transition: border-color 0.3s ease;
        }

        .sidebar.alert-precrash { border-right-color: var(--accent-orange); animation: border-pulse-orange 1.5s infinite; }
        .sidebar.alert-crash { border-right-color: var(--accent-red); animation: border-pulse-red 0.5s infinite; }

        @keyframes border-pulse-orange { 0%, 100% { box-shadow: inset -5px 0 15px rgba(255,157,0,0.2); } 50% { box-shadow: inset -5px 0 30px rgba(255,157,0,0.5); } }
        @keyframes border-pulse-red { 0%, 100% { box-shadow: inset -5px 0 20px rgba(255,0,51,0.3); } 50% { box-shadow: inset -5px 0 40px rgba(255,0,51,0.8); } }

        .telemetry-card {
            background: #111;
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 20px;
        }
        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .value { font-size: 1.6rem; color: #fff; }

        #map-container { flex-grow: 1; background: #000; }

        /* --- TRACKER (TRANSMITTER) STYLES --- */
        .transmitter-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #222;
            background: #0a0a0a;
        }
        .transmitter-header h1 { font-size: 0.9rem; letter-spacing: 2px; color: var(--accent-green); margin: 0; }

        .tracker-metrics {
            padding: 30px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .protocol-controls {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #0a0a0a;
            border-top: 1px solid #222;
        }

        .btn {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 15px 5px;
            font-family: inherit;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn-precrash:active { background: var(--accent-orange); color: #000; border-color: #fff; }
        .btn-crash:active { background: var(--accent-red); color: #000; border-color: #fff; }

        /* --- PRE-CRASH OVERLAY --- */
        #precrash-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .data-pipe-viz {
            width: 200px;
            height: 300px;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            padding-bottom: 50px;
        }

        .pipe-line {
            position: absolute;
            top: 0; left: 50%; width: 2px; height: 150px;
            background: var(--accent-green);
            transform: translateX(-50%);
        }
        .pipe-line::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 20px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            animation: flow 1s infinite linear;
        }

        .sd-card {
            width: 60px; height: 80px;
            border: 2px solid #444;
            background: #111;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 0.5rem;
            color: #444;
        }
        .sd-card.flashing { animation: sd-blink 0.5s infinite; }
        @keyframes sd-blink { 
            0%, 100% { border-color: #444; background: #111; color: #444; } 
            50% { border-color: var(--accent-orange); background: rgba(255,157,0,0.1); color: var(--accent-orange); } 
        }
        @keyframes flow { from { top: 0; } to { top: 130px; } }

        /* --- CRASH MODE LOCKDOWN --- */
        #tracker-root.crash-active { background: #800000 !important; }
        #tracker-root.crash-active .transmitter-header,
        #tracker-root.crash-active .protocol-controls,
        #tracker-root.crash-active .label,
        #tracker-root.crash-active .btn { display: none !important; }
        
        #tracker-root.crash-active .tracker-metrics {
            justify-content: center;
            align-items: center;
            padding: 0;
            gap: 40px;
        }
        #tracker-root.crash-active .telemetry-card {
            background: transparent;
            border: none;
            padding: 0; margin: 0;
            text-align: center;
        }
        #tracker-root.crash-active .value {
            font-size: 3.5rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* Marker Styles */
        .pulse-marker {
            width: 14px; height: 14px;
            background: var(--accent-green);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 15px var(--accent-green);
        }
    </style>
</head>
<body class="mode-viewer">

    <!-- VIEWER MODE (GROUND CONTROL) -->
    <div id="viewer-root">
        <aside id="sidebar" class="sidebar">
            <div class="header" style="margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <h2 style="font-size: 0.7rem; color: var(--accent-green); margin: 0; letter-spacing: 3px;">HERMES GROUND CONTROL</h2>
            </div>
            
            <div class="telemetry-card">
                <div class="label">Latitude</div>
                <div id="v-lat" class="value">0.000000</div>
            </div>
            <div class="telemetry-card">
                <div class="label">Longitude</div>
                <div id="v-lon" class="value">0.000000</div>
            </div>
            <div class="telemetry-card">
                <div class="label">Altitude</div>
                <div id="v-alt" class="value">0.0m</div>
            </div>
            <div class="telemetry-card">
                <div class="label">System State</div>
                <div id="v-status" class="value" style="font-size: 1.1rem; color: var(--accent-green);">STANDBY</div>
            </div>
            
            <div style="margin-top: auto; font-size: 0.6rem; color: #333;">LINK: ASIA-SE1-RTDB</div>
        </aside>
        <main id="map-container"></main>
    </div>

    <!-- TRACKER MODE (TRANSMITTER) -->
    <div id="tracker-root">
        <header class="transmitter-header">
            <h1>HERMES TRANSMITTER CONTROL PANEL</h1>
        </header>

        <main class="tracker-metrics">
            <div class="telemetry-card">
                <div class="label">Latitude</div>
                <div id="t-lat" class="value">---</div>
            </div>
            <div class="telemetry-card">
                <div class="label">Longitude</div>
                <div id="t-lon" class="value">---</div>
            </div>
            <div class="telemetry-card">
                <div class="label">Altitude</div>
                <div id="t-alt" class="value">---</div>
            </div>
        </main>

        <section class="protocol-controls">
            <button class="btn btn-precrash" onclick="triggerProtocol('PRECRASH')">Run Pre-Crash Protocol</button>
            <button class="btn btn-crash" onclick="triggerProtocol('CRASH')">Run Crash Protocol</button>
        </section>

        <!-- Simulated Redundancy Overlay -->
        <div id="precrash-overlay">
            <div class="data-pipe-viz">
                <div class="pipe-line"></div>
                <div class="sd-card flashing">SD-A<br>REC</div>
                <div class="sd-card flashing">SD-B<br>REC</div>
            </div>
            <div style="color: var(--accent-orange); font-size: 0.8rem; margin-top: 20px; letter-spacing: 2px;">LOCAL REDUNDANT CACHE ACTIVE</div>
            <div style="color: #666; font-size: 0.6rem; margin-top: 10px;">STREAMING TO CLOUD...</div>
        </div>
    </div>

    <!-- Logic Engine -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const DB_URL = "https://hermes-5aea5-default-rtdb.asia-southeast1.firebasedatabase.app/gps.json";
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') === 'tracker' ? 'tracker' : 'viewer';
        document.body.className = `mode-${mode}`;

        // Global State
        let currentStatus = "NORMAL";
        let lastCoords = { lat: 0, lon: 0, alt: 0 };

        if (mode === 'viewer') initViewer(); else initTracker();

        // --- VIEWER LOGIC ---
        function initViewer() {
            const map = L.map('map-container', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);
            
            const marker = L.marker([0, 0], { 
                icon: L.divIcon({ className: 'pulse-marker', iconSize: [14, 14], iconAnchor: [7, 7] }) 
            }).addTo(map);

            let firstMove = true;

            setInterval(async () => {
                try {
                    const res = await fetch(DB_URL);
                    const data = await res.json();
                    if (!data) return;

                    // Update UI
                    document.getElementById('v-lat').textContent = parseFloat(data.lat).toFixed(6);
                    document.getElementById('v-lon').textContent = parseFloat(data.lon).toFixed(6);
                    document.getElementById('v-alt').textContent = `${parseFloat(data.alt).toFixed(1)}m`;
                    
                    const statusEl = document.getElementById('v-status');
                    const sidebar = document.getElementById('sidebar');
                    const status = (data.status || "NORMAL").toUpperCase();
                    
                    statusEl.textContent = status;
                    sidebar.className = "sidebar"; // reset

                    if (status === "PRECRASH") {
                        statusEl.style.color = "var(--accent-orange)";
                        sidebar.classList.add('alert-precrash');
                    } else if (status === "CRASH") {
                        statusEl.style.color = "var(--accent-red)";
                        sidebar.classList.add('alert-crash');
                    } else {
                        statusEl.style.color = "var(--accent-green)";
                    }

                    // Map Panning
                    const pos = [data.lat, data.lon];
                    marker.setLatLng(pos);
                    if (firstMove) { map.setView(pos, 16); firstMove = false; } else { map.panTo(pos); }

                } catch (e) { console.error("Sync Error", e); }
            }, 1000);
        }

        // --- TRACKER LOGIC ---
        function initTracker() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        lastCoords = {
                            lat: pos.coords.latitude,
                            lon: pos.coords.longitude,
                            alt: pos.coords.altitude || 0
                        };
                        updateTrackerUI();
                        streamData();
                    },
                    (err) => console.error(err),
                    { enableHighAccuracy: true }
                );
            }
        }

        function updateTrackerUI() {
            document.getElementById('t-lat').textContent = lastCoords.lat.toFixed(6);
            document.getElementById('t-lon').textContent = lastCoords.lon.toFixed(6);
            document.getElementById('t-alt').textContent = lastCoords.alt.toFixed(1) + "m";
        }

        async function streamData() {
            const payload = {
                ...lastCoords,
                status: currentStatus,
                timestamp: Date.now(),
                temp: "N/A", press: "N/A", accel: "0,0,0", gyro: "0,0,0"
            };

            try {
                await fetch(DB_URL, {
                    method: 'PATCH',
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.error("TX Error", e); }
        }

        function triggerProtocol(type) {
            currentStatus = type;
            const root = document.getElementById('tracker-root');
            const overlay = document.getElementById('precrash-overlay');

            if (type === 'PRECRASH') {
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.display = 'none'; currentStatus = "NORMAL"; streamData(); }, 5000);
            } else if (type === 'CRASH') {
                root.classList.add('crash-active');
                // Lock established.
            }
            streamData();
        }
    </script>
</body>
</html>
