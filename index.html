<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES | Ground Station Dashboard</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #141414;
            --border: #222;
            --accent: #00ff41;
            --warn: #ffaa00;
            --danger: #ff0033;
            --text: #e0e0e0;
        }
        * { box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: var(--bg); color: var(--text); margin: 0; padding: 25px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #dashboard-container { border: 4px solid var(--border); height: 100%; display: flex; flex-direction: column; transition: all 0.3s ease; }
        
        .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1rem; letter-spacing: 4px; color: var(--accent); margin: 0; }
        .sync-tag { font-size: 0.7rem; color: #555; }

        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; background: var(--border); flex-grow: 1; }
        .metric-tile { background: var(--panel); padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        .label { font-size: 0.7rem; color: #666; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .value { font-size: 1.8rem; color: #fff; }

        /* Status States */
        .status-precrash { border-color: var(--warn) !important; animation: border-flash-warn 1s infinite; }
        .status-crash { border-color: var(--danger) !important; animation: border-flash-danger 0.5s infinite; }

        @keyframes border-flash-warn { 0%, 100% { box-shadow: inset 0 0 20px rgba(255,170,0,0.1); } 50% { box-shadow: inset 0 0 50px rgba(255,170,0,0.3); } }
        @keyframes border-flash-danger { 0%, 100% { background: rgba(255,0,51,0.1); } 50% { background: rgba(255,0,51,0.3); } }

        @media (max-width: 1024px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div id="dashboard-container">
        <header class="header">
            <h1>HERMES STRATEGIC GROUND STATION</h1>
            <div id="sync-time" class="sync-tag">LAST_SYNC: NEVER</div>
        </header>

        <div class="metrics-grid">
            <div class="metric-tile">
                <span class="label">Latitude</span>
                <div id="v-lat" class="value">0.000000</div>
            </div>
            <div class="metric-tile">
                <span class="label">Longitude</span>
                <div id="v-lon" class="value">0.000000</div>
            </div>
            <div class="metric-tile">
                <span class="label">GPS Altitude</span>
                <div id="v-alt" class="value">0.0 m</div>
            </div>
            <div class="metric-tile">
                <span class="label">Temperature</span>
                <div id="v-temp" class="value">-- C</div>
            </div>
            <div class="metric-tile">
                <span class="label">Pressure</span>
                <div id="v-press" class="value">-- hPa</div>
            </div>
            <div class="metric-tile">
                <span class="label">Accelerometer</span>
                <div id="v-accel" class="value" style="font-size: 1.1rem;">0.0, 0.0, 0.0</div>
            </div>
            <div class="metric-tile">
                <span class="label">Gyroscope</span>
                <div id="v-gyro" class="value" style="font-size: 1.1rem;">0.0, 0.0, 0.0</div>
            </div>
            <div class="metric-tile">
                <span class="label">System State</span>
                <div id="v-status" class="value" style="color: var(--accent);">STABLE</div>
            </div>
        </div>
    </div>

    <script>
        const DB_URL = "https://hermes-5aea5-default-rtdb.asia-southeast1.firebasedatabase.app/gps.json";
        const container = document.getElementById('dashboard-container');

        async function poll() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                if (!data) return;

                // Update Values
                document.getElementById('v-lat').textContent = parseFloat(data.lat || 0).toFixed(6);
                document.getElementById('v-lon').textContent = parseFloat(data.lon || 0).toFixed(6);
                document.getElementById('v-alt').textContent = parseFloat(data.alt || 0).toFixed(1) + " m";
                document.getElementById('v-temp').textContent = data.temp || "-- C";
                document.getElementById('v-press').textContent = data.press || "-- hPa";
                document.getElementById('v-accel').textContent = data.accel || "0, 0, 0";
                document.getElementById('v-gyro').textContent = data.gyro || "0, 0, 0";
                
                const status = (data.status || "NORMAL").toUpperCase();
                const statusEl = document.getElementById('v-status');
                statusEl.textContent = status === "NORMAL" ? "STABLE" : status;

                // UI Feedback
                container.className = '';
                if (status === "PRECRASH") {
                    container.classList.add('status-precrash');
                    statusEl.style.color = "var(--warn)";
                } else if (status === "CRASH") {
                    container.classList.add('status-crash');
                    statusEl.style.color = "var(--danger)";
                } else {
                    statusEl.style.color = "var(--accent)";
                }

                document.getElementById('sync-time').textContent = "LAST_SYNC: " + new Date(data.timestamp).toLocaleTimeString();

            } catch (e) {
                console.error("Link Failure", e);
            }
        }

        setInterval(poll, 1000);
        poll();
    </script>
</body>
</html>
