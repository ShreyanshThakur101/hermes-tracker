<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HERMES TRACKER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>HERMES TRACKER</h1>
            <div id="status" class="status-waiting">Waiting for GPS</div>
        </header>

        <main>
            <!-- GPS Section -->
            <div class="display-box">
                <div class="section-title">GPS TELEMETRY</div>
                <div class="data-point">
                    <span class="label">Latitude</span>
                    <span id="lat" class="value">-</span>
                </div>
                <div class="data-point">
                    <span class="label">Longitude</span>
                    <span id="lon" class="value">-</span>
                </div>
                <div class="data-point">
                    <span class="label">Altitude</span>
                    <span id="alt" class="value">-</span>
                </div>
                <div class="data-point">
                    <span class="label">Timestamp</span>
                    <span id="time" class="value">-</span>
                </div>
            </div>

            <!-- Sensor Section -->
            <div class="display-box sensor-box">
                <div class="section-title">HARDWARE SENSORS</div>
                <div class="grid-display">
                    <div class="data-point">
                        <span class="label">Temp</span>
                        <span id="temp" class="value">-</span>
                    </div>
                    <div class="data-point">
                        <span class="label">Pressure</span>
                        <span id="press" class="value">-</span>
                    </div>
                </div>
                <div class="grid-display">
                    <div class="data-point">
                        <span class="label">Accel X/Y/Z</span>
                        <span id="accel" class="value">-</span>
                    </div>
                </div>
                <div class="grid-display">
                    <div class="data-point">
                        <span class="label">Gyro X/Y/Z</span>
                        <span id="gyro" class="value">-</span>
                    </div>
                </div>
                <div class="data-point">
                    <span class="label">Flight Status</span>
                    <span id="flightStatus" class="value">-</span>
                </div>
            </div>

            <button id="startBtn" style="display: none;">START GPS</button>
        </main>
    </div>

    <!-- Firebase SDK -->
    <script type="module" src="script.js"></script>
</body>
</html>
